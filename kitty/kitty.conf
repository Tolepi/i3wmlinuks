# --- FONT_SETTINGS ---
font_family      Hurmit Nerd Font Mono
font_size        11.0

# --- THE_VIBE_REBOOT ---

# Deep Charcoal Black (Easier on the eyes than pure #000000)
background            #121212
# Classic White/Grey text
foreground            #e4e4e4

# Selection: The iconic Windows 95 Navy Blue
selection_background  #000080
selection_foreground  #ffffff

# Cursor: Beautiful White (Terminal Style O_O)
cursor                #ffffff
cursor_shape          beam

# --- LOGO_COLOR_ACCENTS ---
# These are pulled from the logo in windowsjapan.jpg

# Red (Top-left)
color1  #e9703e
# Green (Top-right)
color2  #90b943
# Yellow (Bottom-right)
color3  #e8c33f
# Blue (Bottom-left)
color4  #7c939e

# --- WINDOW_FRAME ---
# Use that industrial grey from your i3 theme
active_border_color   #000080
inactive_border_color #808080
window_padding_width  12

# --- TEZT_EFFECTS ---
background_opacity 0.90
