[colors]
bg = #c0c0c0
fg = #000000

[bar/retro]
font-0 = "Hurmit Nerd Font Mono:size=10;2"
background = ${colors.bg}
foreground = ${colors.fg}
height = 28
border-bottom-size = 2
border-bottom-color = #808080

modules-left = i3
modules-center = title
modules-right = cpu_tezt memory_tezt clock

[module/i3]
type = internal/i3
label-focused = "[%name%]"
label-focused-background = #000080
label-focused-foreground = #ffffff
label-unfocused = " %name% "

[module/title]
type = internal/xwindow
label = "NOW_VIEWING: %title%"
label-maxlen = 30

[module/cpu_tezt]
type = internal/cpu
label = " CPU:%percentage%% "

[module/memory_tezt]
type = internal/memory
label = " RAM:%percentage_used%% "

[module/clock]
type = internal/date
date = " %H:%M:%S "
label = "[ %date% ]"
